name = "l5r-tactics-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Database binding
[[d1_databases]]
binding = "DB"
database_name = "l5r-tactics"
database_id = "placeholder-replace-after-creation"
migrations_dir = "./migrations"

[env.development]
name = "l5r-tactics-api-dev"
route = "https://dev-api.example.com/*"

[[env.development.d1_databases]]
binding = "DB"
database_name = "l5r-tactics-dev"
database_id = "placeholder-replace-after-creation"
migrations_dir = "./migrations"

[env.production]
name = "l5r-tactics-api-prod"
route = "https://api.example.com/*"

[[env.production.d1_databases]]
binding = "DB"
database_name = "l5r-tactics-prod"
database_id = "placeholder-replace-after-creation"
migrations_dir = "./migrations"

[build]
command = "npm run build"
cwd = "."
watch_paths = ["src/**/*.ts"]

[build.upload]
format = "modules"
main = "./dist/index.js"
