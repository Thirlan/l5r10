name = "l5r-tactics-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[env.development]
name = "l5r-tactics-api-dev"
route = "https://dev-api.example.com/*"

[env.production]
name = "l5r-tactics-api-prod"
route = "https://api.example.com/*"

[build]
command = "npm run build"
cwd = "."
watch_paths = ["src/**/*.ts"]

[build.upload]
format = "modules"
main = "./dist/index.js"
